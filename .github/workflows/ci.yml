name: 🚀 Blocket Analytics Full-Stack CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate-frontend:
    name: 🎨 Validate Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Next.js production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  validate-backend:
    name: 📡 Validate FastAPI Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install py_compile

      - name: Compile python files (syntax check)
        run: python -m py_compile backend/main.py backend/database.py backend/translator.py
